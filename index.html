<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Para Gaby</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#1a0a10;
      font-family:'Lora',Georgia,serif;
      overflow:hidden;
    }
    .card{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:20px;
      padding:52px 36px;
      border-radius:28px;
      border:1px solid #5c2040;
      background:#240d18;
      max-width:360px;
      width:92vw;
      min-height:280px;
      cursor:pointer;
      user-select:none;
      position:relative;
      transition:transform .18s, border-color .3s;
    }
    .card:hover{transform:scale(1.02);border-color:#a0436a;}
    .card:active{transform:scale(0.98);}

    /* --- ESTADO INICIAL --- */
    .hint{display:flex;flex-direction:column;align-items:center;gap:16px;transition:opacity .35s;}
    .hint .sobre{font-size:56px;animation:laten 1.6s infinite;}
    @keyframes laten{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}
    .hint p{font-size:14px;color:#c97;letter-spacing:.08em;text-transform:uppercase;text-align:center;}

    /* --- MENSAJE --- */
    .msg{display:none;flex-direction:column;align-items:center;gap:16px;animation:bloom .7s cubic-bezier(.34,1.56,.64,1);}
    @keyframes bloom{from{opacity:0;transform:scale(.55);}to{opacity:1;transform:scale(1);}}
    .frase{font-size:17px;font-style:italic;color:#e8b4c8;text-align:center;line-height:1.7;max-width:260px;}
    .nombre{font-size:40px;font-weight:600;color:#f472a0;text-align:center;line-height:1.1;}
    .linea{width:48px;height:1px;background:#5c2040;}
    .volver{margin-top:4px;font-size:12px;font-family:'Lora',serif;color:#a0436a;background:none;border:1px solid #5c2040;border-radius:20px;padding:5px 16px;cursor:pointer;letter-spacing:.06em;}
    .volver:hover{border-color:#a0436a;color:#f472a0;}

    /* --- CORAZONES --- */
    .cora{position:fixed;pointer-events:none;font-size:20px;animation:subir linear forwards;opacity:0;}
    @keyframes subir{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-240px) scale(.3);}}

    /* --- ESTRELLAS DE FONDO --- */
    canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .card{z-index:1;}
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="card" onclick="abrir()" id="card">
  <div class="hint" id="hint">
    <div class="sobre">💌</div>
    <p>Toca para abrir<br>tu mensaje</p>
  </div>
  <div class="msg" id="msg">
    <p class="frase">"Eres la persona que hace que cada día valga la pena,<br>mi lugar favorito en el mundo."</p>
    <div class="linea"></div>
    <div class="nombre">Para Gaby 💖</div>
    <button class="volver" onclick="cerrar(event)">volver</button>
  </div>
</div>

<script>
/* estrellas */
const cv = document.getElementById('stars');
const cx = cv.getContext('2d');
let stars = [];
function resize(){cv.width=innerWidth;cv.height=innerHeight;stars=Array.from({length:120},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.2+.3,a:Math.random()}));}
function drawStars(){cx.clearRect(0,0,cv.width,cv.height);stars.forEach(s=>{cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(255,200,220,${s.a})`;cx.fill();s.a+=.003*(Math.random()>.5?1:-1);if(s.a<.1)s.a=.1;if(s.a>1)s.a=1;});requestAnimationFrame(drawStars);}
resize();window.addEventListener('resize',resize);drawStars();

/* lógica */
let abierto=false;
function abrir(){
  if(abierto)return; abierto=true;
  const h=document.getElementById('hint');
  h.style.opacity='0';
  setTimeout(()=>{h.style.display='none';const m=document.getElementById('msg');m.style.display='flex';},320);
  lanzar();
}
function lanzar(){
  const e=['❤️','💕','💖','💗','💝','🌸','✨','🌷'];
  let n=0;
  const iv=setInterval(()=>{
    const el=document.createElement('span');
    el.className='cora';
    el.textContent=e[Math.floor(Math.random()*e.length)];
    el.style.left=(3+Math.random()*94)+'vw';
    el.style.top=(55+Math.random()*35)+'vh';
    el.style.animationDuration=(1.8+Math.random()*1.6)+'s';
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
    if(++n>=28)clearInterval(iv);
  },90);
}
function cerrar(e){
  e.stopPropagation();abierto=false;
  const m=document.getElementById('msg');m.style.display='none';
  const h=document.getElementById('hint');h.style.display='flex';h.style.opacity='1';
}
</script>
</body>
</html>
